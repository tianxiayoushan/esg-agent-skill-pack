name: ESG Skill Pack CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python3 -B -m unittest discover -s tests

      - name: Run skill pack validator
        run: python3 -B scripts/validate_skill_pack.py

      - name: Run installer dry-run
        run: ./install.sh --target all --dry-run

      - name: Check whitespace
        run: git diff --check

      - name: Check unwanted tracked files
        run: git ls-files | grep -E '(__pycache__|\.pyc$|\.DS_Store|\.env|secret|credential|node_modules|\.venv|dist/|build/|tmp/|temp/)' && exit 1 || true
