content_areas:
  governance:
    readiness_focus: "Processes, controls, and oversight for sustainability-related or climate-related risks and opportunities."
  strategy:
    readiness_focus: "Effects on business model, value chain, strategy, decision-making, financial position, financial performance, and cash flows."
  risk_management:
    readiness_focus: "Processes to identify, assess, prioritise, and monitor risks and opportunities."
  metrics_and_targets:
    readiness_focus: "Metrics used to monitor performance, including climate-related metrics and targets where applicable."

distinctions:
  readiness: "Preparatory assessment based on provided evidence."
  alignment: "Partial mapping to framework concepts; not a statement of compliance."
  compliance: "Do not state unless full requirements have been assessed and professional confirmation exists."

