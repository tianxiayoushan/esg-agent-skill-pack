framework_name: "ISSB Content Area Map"
jurisdiction: "International"
issuer_scope: "Entities assessing IFRS S1 / IFRS S2 readiness"
source_type: "official-standard-content-map"
official_source_url: "https://www.ifrs.org/sustainability/knowledge-hub/introduction-to-issb-and-ifrs-sustainability-disclosure-standards/"
source_publisher: "IFRS Foundation / International Sustainability Standards Board"
publication_date: "2023-06-26"
